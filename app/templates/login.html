{% extends "base.html" %}

{% block title %}Iniciar Sesión - CineMatch{% endblock %}

{% block content %}
<div class="fondo">
  <div class="container registro-container">
    <div class="registro-card">
      <div>
        <h1 class="registro-titulo text-start">INICIÁ SESIÓN</h1>
        <p class="registro-subtitulo text-start">Bienvenido de vuelta a CineMatch</p>
      </div>

      <form id="formulario-login" class="registro-form" method="POST">

        <!-- Correo electrónico -->
        <div class="form-group field-wrap">
          <div class="input-inner">
            <div class="input-icons">
              <i class="bi bi-envelope icon-left"></i>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="Tu correo electrónico"
                required
              >
            </div>
            <span class="error-message" id="error-email"></span>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="form-group field-wrap">
          <div class="input-inner">
            <div class="input-icons">
              <i class="bi bi-lock icon-left"></i>
              <input
                type="password"
                id="contraseña"
                name="contraseña"
                class="form-control"
                placeholder="Tu contraseña"
                minlength="6"
                required
              >
              <i class="bi bi-eye-slash icon-right" id="togglePassword"></i>
            </div>
            <span class="error-message" id="error-contraseña"></span>
          </div>
        </div>

        <!-- Recordarme + Olvidé contraseña -->
        <div class="d-flex justify-content-between align-items-center form-group">
          <!-- <div class="form-check">
            <input
              type="checkbox"
              id="recordarme"
              name="recordarme"
              class="form-check-input"
            >
            <label class="form-check-label" for="recordarme">Recordarme</label>
          </div> -->
          <a href="#" class="registro-link" style="margin: 0;">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Botones -->
        <div class="registro-botones">
          <button type="submit" class="btn btn-primary btn-registro">Ingresar</button>
        </div>

        <div class="d-flex align-items-center my-1">
          <hr class="flex-grow-1">
          <span class="mx-3 text-muted">o</span>
          <hr class="flex-grow-1">
        </div>

        <div class="mt-1">
          <a href="{{ url_for('usuarios.login_google') }}"
            class="btn btn-outline-dark w-100">
              <i class="bi bi-google"></i>
              Continuar con Google
          </a>
        </div>

        <!-- Link a registro -->
        <p class="registro-link">¿No tenés cuenta? <a href="{{ url_for('usuarios.registro') }}">Registrate aquí</a></p>
      </form>
    </div>
  </div>
</div>


<script>
  // Toggle show/hide password
  const toggleBtn = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('contraseña');

  toggleBtn.addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    toggleBtn.className = isHidden ? 'bi bi-eye icon-right' : 'bi bi-eye-slash icon-right';
  });
</script>

<script>
  document.getElementById('formulario-login').addEventListener('submit', async function(e) {
    e.preventDefault();

    // Limpiar errores previos
    document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
    document.querySelectorAll('.form-control').forEach(el => el.classList.remove('is-invalid'));

    const formData = new FormData(this);

    try {
      const response = await fetch("{{ url_for('usuarios.login') }}", {
        method: 'POST',
        body: formData
      });

      const resultado = await response.json();

      if (resultado.exito) {
        Swal.fire({
          icon: 'success',
          title: '¡Bienvenido!',
          text: resultado.mensaje,
          confirmButtonText: 'Continuar'
        }).then(() => {
          if (resultado.redirigir) {
            window.location.href = resultado.redirigir;
          }
        });
      } else {
        // Marcar campo con error si el backend lo indica
        if (resultado.campo) {
          const campo = document.getElementById(resultado.campo);
          if (campo) {
            campo.classList.add('is-invalid');
            const errorEl = document.getElementById('error-' + resultado.campo);
            if (errorEl) errorEl.textContent = resultado.mensaje;
          }
        }

        Swal.fire({
          icon: 'error',
          title: 'Error al iniciar sesión',
          text: resultado.mensaje
        });
      }
    } catch (error) {
      console.error('Error:', error);
      Swal.fire({
        icon: 'error',
        title: 'Error',
        text: 'Ocurrió un error al procesar tu solicitud'
      });
    }
  });
</script>
{% endblock %}
